[tox]
envlist = py313
isolated_build = false

[testenv]
description = Run the full pytest suite with coverage and show missing lines
package = skip
deps =
    cython>=3.0
    coverage
    setuptools>=68
    wheel
    pytest
    pygame
    numpy
commands_pre =
    python setup.py build_ext --inplace
commands =
    coverage erase
    coverage run -m pytest -q
    coverage report -m
